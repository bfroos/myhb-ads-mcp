name: Deploy to Hetzner

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Test Python syntax
        run: python3 -m py_compile server.py

      - name: Lint check (optional)
        run: python3 -m py_compile requirements.txt 2>/dev/null || true

  notify-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - name: Trigger Deploy Webhook
        run: |
          curl -X POST https://bfr.roos.rocks/deploy/google-ads-mcp \
            -H "Content-Type: application/json" \
            -d '{"branch":"main","commit":"${{ github.sha }}"}' \
            || echo "Webhook failed - manual deploy may be needed"

      - name: Success notification
        run: echo "✅ Tests passed. Deploy webhook triggered."
